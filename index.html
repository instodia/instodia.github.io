<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shivanshu Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron', sans-serif;
}

body {
  background:#05070d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* 🔥 GRID DASHBOARD */
.container {
  width:380px;
  padding:20px;
  border-radius:15px;
  background:rgba(10,15,30,0.9);
  box-shadow:0 0 40px rgba(0,255,255,0.1);
  border:1px solid rgba(0,255,255,0.2);
}

/* 👤 PROFILE */
.profile {
  text-align:center;
  margin-bottom:20px;
}

.profile img {
  width:90px;
  height:90px;
  border-radius:12px;
  border:2px solid #00f0ff;
  box-shadow:0 0 20px #00f0ff;
}

.profile h1 {
  margin-top:10px;
  font-size:20px;
  letter-spacing:2px;
}

.profile p {
  font-size:12px;
  color:#9ca3af;
}

/* ⚡ GRID LINKS */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* 🎮 CARD BUTTON */
.card {
  padding:15px;
  text-align:center;
  border-radius:10px;
  text-decoration:none;
  color:white;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(0,255,255,0.3);
  position:relative;
  overflow:hidden;
  transition:0.25s;
}

/* neon border animation */
.card::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:10px;
  padding:1px;
  background:linear-gradient(90deg, #00f0ff, #ff00ff, #00f0ff);
  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  animation:borderMove 3s linear infinite;
}

@keyframes borderMove {
  0% {background-position:0%;}
  100% {background-position:200%;}
}

/* hover effect */
.card:hover {
  transform:translateY(-5px) scale(1.03);
  box-shadow:0 0 20px #00f0ff;
}

/* icon */
.card i {
  font-size:20px;
  margin-bottom:8px;
  display:block;
}

/* footer */
.footer {
  text-align:center;
  margin-top:15px;
  font-size:11px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">
    <img src="https://i.ibb.co/xSqmdVmq/20250416-044810.jpg">
    <h1>SHIVANSHU</h1>
    <p>WEB DEV • CODER</p>
  </div>

  <div class="grid">

    <a href="https://www.instagram.com/shivanshu.real" target="_blank" class="card">
      <i class="fa fa-instagram"></i>
      Instagram
    </a>

    <a href="https://youtube.com/@techiegrowth" target="_blank" class="card">
      <i class="fa fa-youtube-play"></i>
      YouTube
    </a>

    <a href="https://github.com/instodia" target="_blank" class="card">
      <i class="fa fa-github"></i>
      Github
    </a>

    <a href="https://instodia.netlify.app/smsbomber" target="_blank" class="card">
      <i class="fa fa-bomb"></i>
      SMS Tool
    </a>

    <a href="https://instodia.netlify.app/age-calculator" target="_blank" class="card">
      <i class="fa fa-user"></i>
      Age Calc
    </a>

    <a href="https://instodia.netlify.app/" target="_blank" class="card">
      <i class="fa fa-wrench"></i>
      Tools
    </a>

  </div>

  <div class="footer">instodia</div>

</div>

</body>
</html>
