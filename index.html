<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body {
  background:#03040a;
  color:white;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* 🌌 animated grid background */
body::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  animation:moveGrid 10s linear infinite;
}

@keyframes moveGrid {
  from {transform:translate(0,0);}
  to {transform:translate(-40px,-40px);}
}

/* glowing orb */
body::after {
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  background:radial-gradient(circle, rgba(0,255,255,0.2), transparent);
  filter:blur(80px);
  top:20%;
  left:10%;
}

/* main container */
.container {
  width:400px;
  padding:25px;
  border-radius:18px;
  background:rgba(10,15,30,0.85);
  border:1px solid rgba(0,255,255,0.2);
  box-shadow:0 0 50px rgba(0,255,255,0.15);
  backdrop-filter:blur(10px);
  position:relative;
  z-index:2;
}

/* profile */
.profile {
  text-align:center;
  margin-bottom:20px;
}

.profile img {
  width:95px;
  height:95px;
  border-radius:50%;
  border:2px solid #00f0ff;
  box-shadow:0 0 20px #00f0ff;
}

.profile h1 {
  margin-top:10px;
  font-size:22px;
  letter-spacing:2px;
}

.profile p {
  font-size:12px;
  color:#aaa;
}

/* grid */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* cards */
.card {
  padding:16px;
  border-radius:12px;
  text-align:center;
  text-decoration:none;
  color:white;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(0,255,255,0.2);
  position:relative;
  transition:0.2s;
  overflow:hidden;
}

/* neon glow */
.card:hover {
  transform:translateY(-6px) scale(1.04);
  box-shadow:0 0 25px #00f0ff;
}

/* ripple click */
.card:active::after {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:rgba(0,255,255,0.2);
  top:-50%;
  left:-50%;
  border-radius:50%;
  animation:ripple 0.4s linear;
}

@keyframes ripple {
  from {transform:scale(0);}
  to {transform:scale(1);}
}

.card i {
  font-size:20px;
  margin-bottom:8px;
  display:block;
}

/* footer */
.footer {
  text-align:center;
  margin-top:15px;
  font-size:11px;
  color:#666;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">
    <img src="https://i.ibb.co/xSqmdVmq/20250416-044810.jpg">
    <h1>SHIVANSHU</h1>
    <p>WEB DEV • BUILDER</p>
  </div>

  <div class="grid">

    <a href="https://www.instagram.com/shivanshu.real" target="_blank" class="card">
      <i class="fa fa-instagram"></i>Instagram
    </a>

    <a href="https://youtube.com/@techiegrowth" target="_blank" class="card">
      <i class="fa fa-youtube-play"></i>YouTube
    </a>

    <a href="https://github.com/instodia" target="_blank" class="card">
      <i class="fa fa-github"></i>Github
    </a>

    <a href="https://instodia.netlify.app/smsbomber" target="_blank" class="card">
      <i class="fa fa-bomb"></i>SMS Tool
    </a>

    <a href="https://instodia.netlify.app/age-calculator" target="_blank" class="card">
      <i class="fa fa-user"></i>Age Tool
    </a>

    <a href="https://instodia.netlify.app/" target="_blank" class="card">
      <i class="fa fa-wrench"></i>Tools
    </a>

  </div>

  <div class="footer">instodia</div>

</div>

</body>
</html>
