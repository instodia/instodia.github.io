<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shivanshu Shukla</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* 🔥 DARK LUXURY BACKGROUND */
body {
  height: 100vh;
  background: radial-gradient(circle at top, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* subtle animated glow */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,255,200,0.15), transparent 70%);
  top: -100px;
  left: -100px;
  animation: moveGlow 8s infinite alternate ease-in-out;
}

@keyframes moveGlow {
  to {
    transform: translate(200px, 200px);
  }
}

/* 🧊 GLASS CARD */
.container {
  width: 360px;
  padding: 28px;
  border-radius: 18px;
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 50px rgba(0,255,200,0.08);
  text-align: center;
  z-index: 2;
  animation: fadeUp 1s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform: translateY(40px);}
  to {opacity:1; transform: translateY(0);}
}

/* 👤 PROFILE */
.profile-pic {
  width: 115px;
  height: 115px;
  border-radius: 50%;
  border: 2px solid #00ffd5;
  box-shadow: 0 0 25px rgba(0,255,213,0.6);
  margin-bottom: 12px;
}

h1 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 5px;
  letter-spacing: 1px;
}

.subtitle {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 20px;
}

/* ⚡ BUTTON BASE */
.link, .tool-link {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 13px;
  margin: 10px 0;
  border-radius: 10px;
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

/* 💥 SHINE EFFECT */
.link::after, .tool-link::after {
  content: "";
  position: absolute;
  width: 120%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-120%);
}

.link:hover::after,
.tool-link:hover::after {
  animation: shine 0.8s forwards;
}

@keyframes shine {
  to { transform: translateX(120%); }
}

/* 🎨 COLOR SYSTEM (balanced) */
.link {
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(0, 200, 255, 0.4);
  box-shadow: 0 0 10px rgba(0,200,255,0.2);
}

.link:hover {
  border-color: #00c8ff;
  box-shadow: 0 0 20px rgba(0,200,255,0.6);
  transform: translateY(-2px) scale(1.02);
}

/* 💚 TOOL BUTTON */
.tool-link {
  background: rgba(15, 23, 42, 0.6);
  border: 1px solid rgba(0,255,150,0.4);
  box-shadow: 0 0 10px rgba(0,255,150,0.2);
}

.tool-link:hover {
  border-color: #00ff95;
  box-shadow: 0 0 20px rgba(0,255,150,0.6);
  transform: translateY(-2px) scale(1.02);
}

.icon {
  margin-right: 10px;
  font-size: 16px;
}

/* 🧾 FOOTER */
.copyright {
  margin-top: 15px;
  font-size: 13px;
  color: #6b7280;
}

/* 🔥 MICRO INTERACTIONS */
.link:active,
.tool-link:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<div class="container">
  <img src="https://i.ibb.co/xSqmdVmq/20250416-044810.jpg" class="profile-pic"/>

  <h1>Shivanshu Shukla</h1>
  <p class="subtitle">Web Developer • Coder • Builder</p>

  <a href="https://www.instagram.com/shivanshu.real" class="link" target="_blank">
    <i class="fa fa-instagram icon"></i> Instagram
  </a>

  <a href="https://youtube.com/@techiegrowth" class="link" target="_blank">
    <i class="fa fa-youtube-play icon"></i> YouTube
  </a>

  <a href="https://github.com/instodia" class="link" target="_blank">
    <i class="fa fa-github icon"></i> Github
  </a>

  <a href="https://instodia.netlify.app/smsbomber" class="link" target="_blank">
    <i class="fa fa-bomb icon"></i> SMS Bomber
  </a>

  <a href="https://instodia.netlify.app/age-calculator" class="link" target="_blank">
    <i class="fa fa-user icon"></i> Age Calculator
  </a>

  <a href="https://instodia.netlify.app/" class="tool-link" target="_blank">
    <i class="fa fa-wrench icon"></i> Tools Website
  </a>

  <p class="copyright">© instodia</p>
</div>

</body>
</html>
