<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shivanshu</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: monospace;
}

body {
  height:100vh;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#0ff;
  overflow:hidden;
}

/* scanlines */
body::after {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* flicker */
@keyframes flicker {
  0%,18%,22%,25%,53%,57%,100% {opacity:1;}
  20%,24%,55% {opacity:0.4;}
}

/* card */
.container {
  width:350px;
  padding:25px;
  border:2px solid #0ff;
  box-shadow:0 0 20px #0ff, inset 0 0 10px #0ff;
  background: rgba(0,0,0,0.85);
  text-align:center;
  animation:flicker 3s infinite;
}

/* glitch name */
h1 {
  font-size:26px;
  position:relative;
  margin-bottom:10px;
  color:#0ff;
}

h1::before, h1::after {
  content:attr(data-text);
  position:absolute;
  left:0;
}

h1::before {
  color:#f0f;
  transform:translate(-2px,0);
}

h1::after {
  color:#0ff;
  transform:translate(2px,0);
}

/* profile */
.profile-pic {
  width:100px;
  height:100px;
  border-radius:50%;
  border:2px solid #0ff;
  margin-bottom:10px;
}

/* links */
.link, .tool-link {
  display:flex;
  justify-content:center;
  align-items:center;
  padding:12px;
  margin:10px 0;
  text-decoration:none;
  color:#0ff;
  border:1px solid #0ff;
  transition:0.2s;
  position:relative;
  overflow:hidden;
}

.link:hover {
  background:#0ff;
  color:#000;
  box-shadow:0 0 20px #0ff;
}

/* sweep */
.link:hover::before {
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, #fff, transparent);
  animation:sweep 0.4s linear;
}

@keyframes sweep {
  from {transform:translateX(-100%);}
  to {transform:translateX(100%);}
}

/* tool */
.tool-link {
  border-color:#0f0;
  color:#0f0;
}

.tool-link:hover {
  background:#0f0;
  color:#000;
  box-shadow:0 0 20px #0f0;
}

/* footer */
p {
  margin-top:10px;
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">
  <img src="https://i.ibb.co/xSqmdVmq/20250416-044810.jpg" class="profile-pic"/>

  <h1 data-text="Shivanshu">Shivanshu</h1>

  <a href="https://www.instagram.com/shivanshu.real" class="link" target="_blank">
    <i class="fa fa-instagram"></i>&nbsp; Instagram
  </a>

  <a href="https://youtube.com/@techiegrowth" class="link" target="_blank">
    <i class="fa fa-youtube-play"></i>&nbsp; YouTube
  </a>

  <a href="https://github.com/instodia" class="link" target="_blank">
    <i class="fa fa-github"></i>&nbsp; Github
  </a>

  <a href="https://instodia.netlify.app/smsbomber" class="link" target="_blank">
    <i class="fa fa-bomb"></i>&nbsp; SMS Bomber
  </a>

  <a href="https://instodia.netlify.app/age-calculator" class="link" target="_blank">
    <i class="fa fa-user"></i>&nbsp; Age Calculator
  </a>

  <a href="https://instodia.netlify.app/" class="tool-link" target="_blank">
    <i class="fa fa-wrench"></i>&nbsp; Tools Website
  </a>

  <p>instodia</p>
</div>

</body>
</html>
